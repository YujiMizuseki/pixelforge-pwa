function importJSON() {
  document.getElementById('importInput').click();
}

function handleImport(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const data = JSON.parse(ev.target.result);
      if (data.frames) {
        frames = data.frames.map(f => new Uint8ClampedArray(f));
        history = frames.map(f => [cloneFrameData(f)]);
        historyIndex = frames.map(() => 0);
        currentFrame = 0;
        renderAll();
        renderFrameRow();
      }
    } catch(err) { alert('Invalid JSON'); }
  };
  reader.readAsText(file);
  e.target.value = '';
}

function importPNGToFrame() {
  document.getElementById('pngFrameInput').click();
}

function handlePNGFrameImport(e) {
  const files = Array.from(e.target.files);
  if (!files.length) return;
  e.target.value = '';

  function loadFile(file, isFirst) {
    return new Promise(resolve => {
      const url = URL.createObjectURL(file);
      const img = new Image();
      img.onload = () => {
        URL.revokeObjectURL(url);
        const tmp = document.createElement('canvas');
        tmp.width = SIZE; tmp.height = SIZE;
        const tctx = tmp.getContext('2d');
        tctx.imageSmoothingEnabled = true;
        tctx.imageSmoothingQuality = 'low';
        tctx.drawImage(img, 0, 0, SIZE, SIZE);
        const imgData = tctx.getImageData(0, 0, SIZE, SIZE);
        if (isFirst) {
          // 1枚目は現在のフレームに上書き
          frames[currentFrame].set(imgData.data);
          pushHistory();
        } else {
          // 2枚目以降は現在フレームの直後に新規フレームとして追加
          const newData = createEmptyFrameData();
          newData.set(imgData.data);
          const insertAt = currentFrame + 1;
          frames.splice(insertAt, 0, newData);
          history.splice(insertAt, 0, [cloneFrameData(newData)]);
          historyIndex.splice(insertAt, 0, 0);
          currentFrame = insertAt;
        }
        resolve();
      };
      img.src = url;
    });
  }

  // 順番通りに1枚ずつ処理
  files.reduce((chain, file, i) =>
    chain.then(() => loadFile(file, i === 0)),
    Promise.resolve()
  ).then(() => {
    renderAll();
    renderFrameRow();
  });
}

function copyDataURL() {
  const tmp = document.createElement('canvas');
  tmp.width = SIZE; tmp.height = SIZE;
  const tctx = tmp.getContext('2d');
  const imgData = new ImageData(SIZE, SIZE);
  imgData.data.set(frames[currentFrame]);
  tctx.putImageData(imgData, 0, 0);
  const url = tmp.toDataURL('image/png');
  navigator.clipboard.writeText(url).then(() => {
    const btn = event.target;
    const orig = btn.textContent;
    btn.textContent = '✓ COPIED';
    setTimeout(() => btn.textContent = orig, 1500);
  });
}

// ══════════════════════════════════════════════
//  SPRITE SHEET EXPORT
// ══════════════════════════════════════════════
function buildSpriteSheetCanvas() {
  const n = frames.length;
  const sheet = document.createElement('canvas');
  sheet.width = SIZE * n;
  sheet.height = SIZE;
  const sctx = sheet.getContext('2d');
  frames.forEach((frameData, fi) => {
    const fc = document.createElement('canvas');
    fc.width = SIZE; fc.height = SIZE;
    const imgData = new ImageData(SIZE, SIZE);
    imgData.data.set(frameData);
    fc.getContext('2d').putImageData(imgData, 0, 0);
    sctx.drawImage(fc, fi * SIZE, 0);
  });
  return sheet;
}

function exportSpriteSheet() {
  const sheet = buildSpriteSheetCanvas();
  const dataURL = sheet.toDataURL('image/png');
  if (_inTauri) {
    _tauriNativeSave('spritesheet.png', 'png', _dataURLtoBase64(dataURL));
  } else {
    _downloadFallback('spritesheet.png', dataURL);
  }
  updateSpriteSheetInfo();
}

function exportSpriteSheetSVG() {
  const n = frames.length;
  const totalW = SIZE * n;
  let svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${totalW}" height="${SIZE}" viewBox="0 0 ${totalW} ${SIZE}" shape-rendering="crispEdges">\n`;
  frames.forEach((frameData, fi) => {
    const ox = fi * SIZE;
    svg += `  <g id="frame${fi + 1}" transform="translate(${ox},0)">\n`;
    for (let y = 0; y < SIZE; y++) {
      for (let x = 0; x < SIZE; x++) {
        const i = (y * SIZE + x) * 4;
        const r = frameData[i], g = frameData[i+1], b = frameData[i+2], a = frameData[i+3];
        if (a === 0) continue;
        const fill = a === 255
          ? `rgb(${r},${g},${b})`
          : `rgba(${r},${g},${b},${(a/255).toFixed(3)})`;
        svg += `    <rect x="${x}" y="${y}" width="1" height="1" fill="${fill}"/>\n`;
      }
    }
    svg += `  </g>\n`;
  });
  svg += `</svg>`;
  const blob = new Blob([svg], { type: 'image/svg+xml' });
  if (_inTauri) {
    _blobToBase64(blob).then(b64 => _tauriNativeSave('spritesheet.svg', 'svg', b64));
  } else {
    _downloadFallback('spritesheet.svg', blob);
  }
}

function exportSpriteSheetMeta() {
  const n = frames.length;
  const meta = {
    frameWidth: SIZE,
    frameHeight: SIZE,
    frameCount: n,
    sheetWidth: SIZE * n,
    sheetHeight: SIZE,
    frames: frames.map((_, fi) => ({
      index: fi,
      x: fi * SIZE,
      y: 0,
      w: SIZE,
      h: SIZE
    }))
  };
  const jsonStr = JSON.stringify(meta, null, 2);
  if (_inTauri) {
    _tauriNativeSave('spritesheet.json', 'json', btoa(jsonStr));
  } else {
    const blob = new Blob([jsonStr], { type: 'application/json' });
    _downloadFallback('spritesheet.json', blob);
  }
}

function updateSpriteSheetInfo() {
  const el = document.getElementById('spriteSheetInfo');
  if (el) el.textContent = `${SIZE * frames.length} × ${SIZE} px · ${frames.length} フレーム`;
}

// ══════════════════════════════════════════════
//  GIF EXPORT (GIF89a, pure JS, no libs)
// ══════════════════════════════════════════════
function exportAnimGIF() {
  // ── 1. Build global color palette ──
  const colorMap = new Map(); // packed RGB → palette index
  let hasAlpha = false;

  frames.forEach(fd => {
    for (let i = 0; i < SIZE * SIZE; i++) {
      if (fd[i*4+3] < 128) { hasAlpha = true; continue; }
      const key = (fd[i*4] << 16) | (fd[i*4+1] << 8) | fd[i*4+2];
      if (!colorMap.has(key)) colorMap.set(key, -1);
    }
  });

  const palette = [];
  if (hasAlpha) palette.push([0, 0, 0]); // index 0 = transparent slot
  colorMap.forEach((_, key) => {
    colorMap.set(key, palette.length);
    palette.push([(key >> 16) & 0xFF, (key >> 8) & 0xFF, key & 0xFF]);
  });

  // Pad palette to next power-of-2, min 4
  let palSize = 4;
  while (palSize < palette.length) palSize <<= 1;
  while (palette.length < palSize) palette.push([0, 0, 0]);

  const palBitsField = Math.log2(palSize) - 1; // 0-7 for GIF header field
  const minCodeSize  = Math.max(2, Math.log2(palSize)); // LZW min code size

  // ── 2. Map frame pixels to palette indices ──
  function frameToIdxs(fd) {
    const out = new Uint8Array(SIZE * SIZE);
    for (let i = 0; i < SIZE * SIZE; i++) {
      if (fd[i*4+3] < 128) { out[i] = 0; continue; }
      const key = (fd[i*4] << 16) | (fd[i*4+1] << 8) | fd[i*4+2];
      out[i] = colorMap.get(key) ?? 0;
    }
    return out;
  }

  // ── 3. LZW encoder ──
  function lzwEncode(idxs) {
    const clearCode = 1 << minCodeSize;
    const eofCode   = clearCode + 1;
    let codeSize = minCodeSize + 1;
    let nextCode = eofCode + 1;
    let table = new Map();

    let buf = 0, bits = 0;
    const stream = [];
    const emit = code => {
      buf |= code << bits; bits += codeSize;
      while (bits >= 8) { stream.push(buf & 0xFF); buf >>>= 8; bits -= 8; }
    };
    const reset = () => {
      table = new Map(); codeSize = minCodeSize + 1; nextCode = eofCode + 1;
    };

    emit(clearCode);
    let prefix = idxs[0];
    for (let i = 1; i < idxs.length; i++) {
      const sym = idxs[i];
      const key = `${prefix},${sym}`;
      if (table.has(key)) {
        prefix = table.get(key);
      } else {
        emit(prefix);
        if (nextCode <= 0xFFF) {
          table.set(key, nextCode++);
          if (nextCode > (1 << codeSize) && codeSize < 12) codeSize++;
        } else {
          emit(clearCode); reset();
        }
        prefix = sym;
      }
    }
    emit(prefix); emit(eofCode);
    if (bits > 0) stream.push(buf & 0xFF);

    // Pack into sub-blocks (max 255 bytes each)
    const packed = [minCodeSize];
    for (let i = 0; i < stream.length; i += 255) {
      const chunk = stream.slice(i, i + 255);
      packed.push(chunk.length, ...chunk);
    }
    packed.push(0); // block terminator
    return packed;
  }

  // ── 4. Assemble GIF89a binary ──
  const delay = Math.max(2, Math.round(100 / playbackFPS)); // centiseconds
  const bytes = [];
  const wb  = (...args) => bytes.push(...args);
  const ww  = v  => bytes.push(v & 0xFF, (v >> 8) & 0xFF);
  const wst = s  => { for (const c of s) bytes.push(c.charCodeAt(0)); };

  // Header + Logical Screen Descriptor
  wst('GIF89a'); ww(SIZE); ww(SIZE);
  wb(0x80 | palBitsField, 0, 0);
  palette.forEach(c => wb(c[0], c[1], c[2]));

  // NETSCAPE 2.0 extension → loop forever
  wb(0x21, 0xFF, 11); wst('NETSCAPE2.0');
  wb(3, 1); ww(0); wb(0);

  // disposal=2 (restore bg), transparent flag if needed
  const gcePacked = hasAlpha ? 0x09 : 0x08;

  frames.forEach(fd => {
    // Graphic Control Extension
    wb(0x21, 0xF9, 4, gcePacked); ww(delay); wb(0, 0);
    // Image Descriptor
    wb(0x2C); ww(0); ww(0); ww(SIZE); ww(SIZE); wb(0x00);
    // Image Data (LZW)
    wb(...lzwEncode(frameToIdxs(fd)));
  });

  wb(0x3B); // Trailer

  const blob = new Blob([new Uint8Array(bytes)], { type: 'image/gif' });
  if (_inTauri) {
    _blobToBase64(blob).then(b64 => _tauriNativeSave('animation.gif', 'gif', b64));
  } else {
    _downloadFallback('animation.gif', blob);
  }
}

// ══════════════════════════════════════════════
//  KEYBOARD SHORTCUTS
// ══════════════════════════════════════════════
function updateSelModeDisplay() {
  if (currentTool !== 'select') return;
  const pressed = { ctrl: false, alt: false };
  // dynamically read from the event, called from keydown/keyup
  const hint = pressed.ctrl && pressed.alt ? ' [交差]'
             : pressed.ctrl ? ' [+追加]'
             : pressed.alt  ? ' [−除外]' : '';
  document.getElementById('toolDisplay').textContent = 'ツール: 選択' + hint;
}

document.addEventListener('keydown', e => {
  if (currentTool === 'select' && (e.key === 'Control' || e.key === 'Alt')) {
    const hint = (e.ctrlKey && e.altKey) ? ' [交差]'
               : e.ctrlKey ? ' [+追加]'
               : e.altKey  ? ' [−除外]' : '';
    document.getElementById('toolDisplay').textContent = 'ツール: 選択' + hint;
    if (e.key === 'Alt') e.preventDefault(); // prevent menu on Windows
  }
  if (e.target.tagName === 'INPUT') return;
  switch(e.key.toLowerCase()) {
    case 'b': case 'p': setTool('draw'); break;
    case 'e': setTool('erase'); break;
    case 'f': setTool('fill'); break;
    case 'i': setTool('pick'); break;
    case 'l': setTool('line'); break;
    case 's': setTool('select'); break;
    case 'g': toggleGrid(); break;
    case 'escape': if (currentTool==='select') commitSelection(); break;
    case 'delete': case 'backspace':
      if (currentTool === 'select' && selMask && selBaseData) {
        frames[currentFrame].set(selBaseData);
        pushHistory();
        selMask = null; selectionData = null; selBaseData = null;
        selOffset = {x:0, y:0}; selPreviewRect = null;
        selCreating = false; selMoving = false;
        renderAll(); renderSelection();
        e.preventDefault();
      }
      break;
    case 'z': if(!e.repeat && (e.ctrlKey||e.metaKey)) { e.shiftKey?redo():undo(); e.preventDefault(); } break;
    case 'y': if(!e.repeat && (e.ctrlKey||e.metaKey)) { redo(); e.preventDefault(); } break;
  }
});

document.addEventListener('keyup', e => {
  if (currentTool === 'select' && (e.key === 'Control' || e.key === 'Alt')) {
    document.getElementById('toolDisplay').textContent = 'ツール: 選択';
  }
});

// ══════════════════════════════════════════════
//  MCP API — window.__pixelEditor
// ══════════════════════════════════════════════
window.__pixelEditor = {
  // -1 means "use current frame"
  _fi(fi) { return (fi < 0) ? currentFrame : fi; },

  // Get current frame as flat RGBA array
  getFrameData(frameIndex = -1) {
    const fi = this._fi(frameIndex);
    return Array.from(frames[fi] || frames[0]);
  },

  // Set a single pixel
  setPixel(x, y, r, g, b, a = 255, frameIndex = -1) {
    const fi = this._fi(frameIndex);
    if (fi >= frames.length) return { error: 'Frame not found' };
    setPixel(frames[fi], x, y, {r,g,b,a});
    pushHistory();
    renderAll();
    return { ok: true, x, y, r, g, b, a };
  },

  // Get a single pixel
  getPixel(x, y, frameIndex = -1) {
    const fi = this._fi(frameIndex);
    const p = getPixel(frames[fi] || frames[0], x, y);
    return p || { error: 'Out of bounds' };
  },

  // Fill all pixels with color
  fill(r, g, b, a = 255, frameIndex = -1) {
    const fi = this._fi(frameIndex);
    for (let y = 0; y < SIZE; y++)
      for (let x = 0; x < SIZE; x++)
        setPixel(frames[fi], x, y, {r,g,b,a});
    pushHistory();
    renderAll();
    return { ok: true };
  },

  // Clear (transparent)
  clear(frameIndex = -1) {
    const fi = this._fi(frameIndex);
    frames[fi] = createEmptyFrameData();
    pushHistory();
    renderAll();
    return { ok: true };
  },

  // Draw a rectangle
  drawRect(x, y, w, h, r, g, b, a = 255, filled = false, frameIndex = -1) {
    const fi = this._fi(frameIndex);
    for (let dy = 0; dy < h; dy++)
      for (let dx = 0; dx < w; dx++) {
        const onEdge = dx===0||dx===w-1||dy===0||dy===h-1;
        if (filled || onEdge)
          setPixel(frames[fi], x+dx, y+dy, {r,g,b,a});
      }
    pushHistory();
    renderAll();
    return { ok: true };
  },

  // Draw a line
  drawLine(x0, y0, x1, y1, r, g, b, a = 255, frameIndex = -1) {
    const fi = this._fi(frameIndex);
    bresenham(x0,y0,x1,y1).forEach(([px,py]) =>
      setPixel(frames[fi], px, py, {r,g,b,a}));
    pushHistory();
    renderAll();
    return { ok: true };
  },

  // Draw circle
  drawCircle(cx, cy, radius, r, g, b, a = 255, filled = false, frameIndex = -1) {
    const fi = this._fi(frameIndex);
    for (let y = 0; y < SIZE; y++)
      for (let x = 0; x < SIZE; x++) {
        const dist = Math.sqrt((x-cx)**2+(y-cy)**2);
        const onEdge = Math.abs(dist - radius) < 0.8;
        if (filled ? dist <= radius + 0.5 : onEdge)
          setPixel(frames[fi], x, y, {r,g,b,a});
      }
    pushHistory();
    renderAll();
    return { ok: true };
  },

  // Load frame from flat array
  loadFrameData(data, frameIndex = -1) {
    const fi = this._fi(frameIndex);
    if (data.length !== SIZE * SIZE * 4) return { error: 'Invalid data length' };
    frames[fi] = new Uint8ClampedArray(data);
    renderAll();
    return { ok: true };
  },

  // Add new frame
  addFrame() {
    addFrame();
    return { ok: true, frameCount: frames.length, currentFrame };
  },

  // Switch frame
  switchFrame(fi) {
    if (fi < 0 || fi >= frames.length) return { error: 'Invalid frame index' };
    switchFrame(fi);
    return { ok: true, currentFrame };
  },

  // Get info
  getInfo() {
    return {
      size: SIZE,
      frameCount: frames.length,
      currentFrame,
      currentColor,
      currentTool,
    };
  },

  // Set current color
  setColor(r, g, b, a = 255) {
    currentColor = {r,g,b,a};
    syncColorUIFromState();
    return { ok: true };
  },

  // Export current frame as PNG data URL
  exportPNGDataURL(frameIndex = -1) {
    const fi = this._fi(frameIndex);
    const tmp = document.createElement('canvas');
    tmp.width = SIZE; tmp.height = SIZE;
    const tctx = tmp.getContext('2d');
    const imgData = new ImageData(SIZE, SIZE);
    imgData.data.set(frames[fi]);
    tctx.putImageData(imgData, 0, 0);
    return { dataURL: tmp.toDataURL('image/png') };
  },

  // Export all frames as JSON object
  exportJSON() {
    return {
      version: 1,
      size: SIZE,
      frames: frames.map(f => Array.from(f))
    };
  },

  undo,
  redo,

  // Start/resize editor (for MCP programmatic use)
  startEditor(size) {
    startEditor(size);
    return { ok: true, size: SIZE };
  },
};

function removePaletteColor(i) {
  if (i < 2) return; // protect transparent & white
  PALETTE.splice(i, 1);
  buildPalette();
}

// ══════════════════════════════════════════════
//  COLOR PICKER MODAL (HSB)
// ══════════════════════════════════════════════
// Modal state
let modal = {
  h: 336, s: 100, b: 100, a: 255, // HSB + alpha
  dragging: null, // 'sv' | 'hue' | 'sat' | 'bri' | 'alpha'
};

// ── HSB ↔ RGB conversions ──
function hsbToRgb(h, s, b) {
  // h 0-360, s 0-100, b 0-100
  s /= 100; b /= 100;
  const k = n => (n + h / 60) % 6;
  const f = n => b * (1 - s * Math.max(0, Math.min(k(n), 4 - k(n), 1)));
  return {
    r: Math.round(f(5) * 255),
    g: Math.round(f(3) * 255),
    b: Math.round(f(1) * 255),
  };
}

function rgbToHsb(r, g, b) {
  r /= 255; g /= 255; b /= 255;
  const max = Math.max(r,g,b), min = Math.min(r,g,b), d = max - min;
  let h = 0;
  if (d !== 0) {
    if (max === r) h = ((g - b) / d) % 6;
    else if (max === g) h = (b - r) / d + 2;
    else h = (r - g) / d + 4;
    h = Math.round(h * 60);
    if (h < 0) h += 360;
  }
  const s = max === 0 ? 0 : Math.round((d / max) * 100);
  const br = Math.round(max * 100);
  return { h, s, b: br };
}

function openColorModal(initColor) {
  // init from currentColor if no arg
  const c = initColor || currentColor;
  if (c.a === 0) {
    modal.h = 0; modal.s = 0; modal.b = 0; modal.a = 0;
  } else {
    const hsb = rgbToHsb(c.r, c.g, c.b);
    modal.h = hsb.h; modal.s = hsb.s; modal.b = hsb.b; modal.a = c.a;
  }
  document.getElementById('colorPickerModal').classList.add('open');
  drawSvSquare();
  drawHueTrack();
  drawSatTrack();
  drawBriTrack();
  drawAlphaTrack();
  updateModalUI();
  updateModalThumbPositions();
}

function closeColorModal() {
  document.getElementById('colorPickerModal').classList.remove('open');
}

function useColorNow() {
  const rgb = hsbToRgb(modal.h, modal.s, modal.b);
  currentColor = { r: rgb.r, g: rgb.g, b: rgb.b, a: modal.a };
  syncColorUIFromState();
  document.querySelectorAll('.pal-swatch').forEach(s => s.classList.remove('selected'));
  closeColorModal();
}

function addColorToPalette() {
  const rgb = hsbToRgb(modal.h, modal.s, modal.b);
  const c = { r: rgb.r, g: rgb.g, b: rgb.b, a: modal.a };
  PALETTE.push(c);
  buildPalette();
  // Select the newly added color
  selectPaletteColor(PALETTE.length - 1);
  closeColorModal();
}

// ── Draw SV square ──
function drawSvSquare() {
  const canvas = document.getElementById('svCanvas');
  const w = canvas.width, h = canvas.height;
  const ctx = canvas.getContext('2d');
  // White → hue gradient (horizontal)
  const hueRgb = hsbToRgb(modal.h, 100, 100);
  const hGrad = ctx.createLinearGradient(0, 0, w, 0);
  hGrad.addColorStop(0, 'white');
  hGrad.addColorStop(1, `rgb(${hueRgb.r},${hueRgb.g},${hueRgb.b})`);
  ctx.fillStyle = hGrad;
  ctx.fillRect(0, 0, w, h);
  // Transparent → black gradient (vertical)
  const vGrad = ctx.createLinearGradient(0, 0, 0, h);
  vGrad.addColorStop(0, 'rgba(0,0,0,0)');
  vGrad.addColorStop(1, 'rgba(0,0,0,1)');
  ctx.fillStyle = vGrad;
  ctx.fillRect(0, 0, w, h);
}

function drawHueTrack() {
  const c = document.getElementById('hueCanvas');
  const ctx = c.getContext('2d');
  const grad = ctx.createLinearGradient(0, 0, c.width, 0);
  for (let i = 0; i <= 360; i += 30) {
    const rgb = hsbToRgb(i, 100, 100);
    grad.addColorStop(i / 360, `rgb(${rgb.r},${rgb.g},${rgb.b})`);
  }
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, c.width, c.height);
}

function drawSatTrack() {
  const c = document.getElementById('satCanvas');
  const ctx = c.getContext('2d');
  const baseRgb = hsbToRgb(modal.h, 100, modal.b);
  const grayRgb = hsbToRgb(modal.h, 0, modal.b);
  const grad = ctx.createLinearGradient(0, 0, c.width, 0);
  grad.addColorStop(0, `rgb(${grayRgb.r},${grayRgb.g},${grayRgb.b})`);
  grad.addColorStop(1, `rgb(${baseRgb.r},${baseRgb.g},${baseRgb.b})`);
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, c.width, c.height);
}

function drawBriTrack() {
  const c = document.getElementById('briCanvas');
  const ctx = c.getContext('2d');
  const fullRgb = hsbToRgb(modal.h, modal.s, 100);
  const grad = ctx.createLinearGradient(0, 0, c.width, 0);
  grad.addColorStop(0, 'black');
  grad.addColorStop(1, `rgb(${fullRgb.r},${fullRgb.g},${fullRgb.b})`);
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, c.width, c.height);
}

function drawAlphaTrack() {
  const rgb = hsbToRgb(modal.h, modal.s, modal.b);
  const el = document.getElementById('alphaGradientModal');
  el.style.background = `linear-gradient(to right, rgba(${rgb.r},${rgb.g},${rgb.b},0), rgba(${rgb.r},${rgb.g},${rgb.b},1))`;
}

function updateModalThumbPositions() {
  const svSquare = document.getElementById('svSquare');
  const sw = svSquare.offsetWidth, sh = svSquare.offsetHeight;
  const cx = (modal.s / 100) * sw;
  const cy = (1 - modal.b / 100) * sh;
  const cur = document.getElementById('svCursor');
  cur.style.left = cx + 'px';
  cur.style.top = cy + 'px';

  document.getElementById('hueThumb').style.left = `calc(${modal.h / 360 * 100}% )`;
  document.getElementById('satThumb').style.left = `calc(${modal.s}%)`;
  document.getElementById('briThumb').style.left = `calc(${modal.b}%)`;
  document.getElementById('alphaThumbModal').style.left = `calc(${modal.a / 255 * 100}%)`;
}

function updateModalUI() {
  const rgb = hsbToRgb(modal.h, modal.s, modal.b);
  const hexColor = '#' + [rgb.r, rgb.g, rgb.b, modal.a]
    .map(v => v.toString(16).padStart(2,'0')).join('').toUpperCase();

  document.getElementById('modalHexInput').value = hexColor;
  document.getElementById('modalRgbDisplay').textContent =
    `rgb(${rgb.r}, ${rgb.g}, ${rgb.b})  alpha: ${modal.a}`;
  document.getElementById('modalHsbDisplay').textContent =
    `hsb(${modal.h}°, ${modal.s}%, ${modal.b}%)`;

  const swatchFill = document.getElementById('modalSwatchFill');
  swatchFill.style.background = `rgba(${rgb.r},${rgb.g},${rgb.b},${modal.a/255})`;

  document.getElementById('hueVal').textContent = modal.h + '°';
  document.getElementById('satVal').textContent = modal.s + '%';
  document.getElementById('briVal').textContent = modal.b + '%';
  document.getElementById('alphaValModal').textContent = modal.a;
}

function onModalHexInput() {
  let val = document.getElementById('modalHexInput').value.trim();
  if (!val.startsWith('#')) val = '#' + val;
  const hex6 = /^#([0-9a-fA-F]{6})$/.test(val);
  const hex8 = /^#([0-9a-fA-F]{8})$/.test(val);
  if (!hex6 && !hex8) return;
  const r = parseInt(val.slice(1,3),16);
  const g = parseInt(val.slice(3,5),16);
  const b = parseInt(val.slice(5,7),16);
  const a = hex8 ? parseInt(val.slice(7,9),16) : 255;
  const hsb = rgbToHsb(r, g, b);
  modal.h = hsb.h; modal.s = hsb.s; modal.b = hsb.b; modal.a = a;
  drawSvSquare();
  drawSatTrack();
  drawBriTrack();
  drawAlphaTrack();
  updateModalUI();
  updateModalThumbPositions();
}

// ── Track drag helpers ──
function getTrackRatio(track, e) {
  const rect = track.getBoundingClientRect();
  return Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
}

function setupTrackDrag(trackId, onDrag) {
  const track = document.getElementById(trackId);
  track.addEventListener('mousedown', e => {
    modal.dragging = trackId;
    onDrag(e);
  });
}

// SV square drag
document.addEventListener('DOMContentLoaded', () => {
  const svSquare = document.getElementById('svSquare');

  svSquare.addEventListener('mousedown', e => {
    modal.dragging = 'sv';
    handleSvDrag(e);
  });

  setupTrackDrag('hueTrack', e => {
    modal.h = Math.round(getTrackRatio(document.getElementById('hueTrack'), e) * 360);
    drawSvSquare(); drawSatTrack(); drawBriTrack(); drawAlphaTrack();
    updateModalUI(); updateModalThumbPositions();
  });
  setupTrackDrag('satTrack', e => {
    modal.s = Math.round(getTrackRatio(document.getElementById('satTrack'), e) * 100);
    drawSvSquare(); drawBriTrack(); drawAlphaTrack();
    updateModalUI(); updateModalThumbPositions();
  });
  setupTrackDrag('briTrack', e => {
    modal.b = Math.round(getTrackRatio(document.getElementById('briTrack'), e) * 100);
    drawSvSquare(); drawSatTrack(); drawAlphaTrack();
    updateModalUI(); updateModalThumbPositions();
  });
  setupTrackDrag('alphaTrackModal', e => {
    modal.a = Math.round(getTrackRatio(document.getElementById('alphaTrackModal'), e) * 255);
    drawAlphaTrack();
    updateModalUI(); updateModalThumbPositions();
  });

  document.addEventListener('mousemove', e => {
    if (!modal.dragging) return;
    if (modal.dragging === 'sv') {
      handleSvDrag(e);
    } else if (modal.dragging === 'hueTrack') {
      modal.h = Math.round(getTrackRatio(document.getElementById('hueTrack'), e) * 360);
      drawSvSquare(); drawSatTrack(); drawBriTrack(); drawAlphaTrack();
      updateModalUI(); updateModalThumbPositions();
    } else if (modal.dragging === 'satTrack') {
      modal.s = Math.round(getTrackRatio(document.getElementById('satTrack'), e) * 100);
      drawSvSquare(); drawBriTrack(); drawAlphaTrack();
      updateModalUI(); updateModalThumbPositions();
    } else if (modal.dragging === 'briTrack') {
      modal.b = Math.round(getTrackRatio(document.getElementById('briTrack'), e) * 100);
      drawSvSquare(); drawSatTrack(); drawAlphaTrack();
      updateModalUI(); updateModalThumbPositions();
    } else if (modal.dragging === 'alphaTrackModal') {
      modal.a = Math.round(getTrackRatio(document.getElementById('alphaTrackModal'), e) * 255);
      drawAlphaTrack();
      updateModalUI(); updateModalThumbPositions();
    }
  });

  document.addEventListener('mouseup', () => { modal.dragging = null; });

  // Close on overlay click
  document.getElementById('colorPickerModal').addEventListener('mousedown', e => {
    if (e.target === document.getElementById('colorPickerModal')) closeColorModal();
  });
});

function handleSvDrag(e) {
  const sq = document.getElementById('svSquare');
  const rect = sq.getBoundingClientRect();
  const rx = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
  const ry = Math.max(0, Math.min(1, (e.clientY - rect.top) / rect.height));
  modal.s = Math.round(rx * 100);
  modal.b = Math.round((1 - ry) * 100);
  drawSatTrack(); drawBriTrack(); drawAlphaTrack();
  updateModalUI(); updateModalThumbPositions();
}

  startEditor(Number(_urlSize));
}
// Otherwise wait for user to pick a size from the selector
</script>
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('service-worker.js').catch(() => {});
}
</script>
